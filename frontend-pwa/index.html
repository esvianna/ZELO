<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zelo - Assistente do Visitante</title>

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#137fec">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Zelo">

    <!-- CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="assets/css/style.css?v=6">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <!-- App Header -->
    <header class="app-header">
        <a href="#" class="logo" onclick="app.router.navigate('home'); return false;">
            <img src="images/logo-zelo.png" alt="Zelo"
                style="max-height: 80px !important; width: auto; object-fit: contain;">
        </a>
        <div class="status-indicator" id="network-status">Online</div>
    </header>

    <!-- Main Content -->
    <main id="app-content">

        <!-- Home View -->
        <section id="view-home" class="view active">
            <div class="hero">
                <h1>Bem-vindo ao Zelo</h1>
                <p>Cuidado e atenção para você.</p>
            </div>

            <div class="quick-actions">
                <button class="action-card emergency" onclick="app.router.navigate('emergencia')">
                    <span class="icon">🚑</span>
                    <span>Emergência</span>
                </button>
                <button class="action-card pharmacy" onclick="app.router.navigate('lista', {category: 'farmacia'})">
                    <span class="icon">💊</span>
                    <span>Farmácias</span>
                </button>
                <button class="action-card hospital" onclick="app.router.navigate('lista', {category: 'hospital'})">
                    <span class="icon">🏥</span>
                    <span>Hospitais</span>
                </button>
            </div>

            <div class="secondary-actions">
                <button class="btn-block" onclick="app.router.navigate('mapa')">
                    Ver Mapa Geral
                </button>
                <button class="btn-block outline" onclick="app.router.navigate('evento')">
                    Informações do Evento
                </button>
            </div>
        </section>

        <!-- Map View -->
        <section id="view-mapa" class="view">
            <div id="map-container"></div>
            <button class="back-fab" onclick="app.router.back()">⬅</button>
        </section>

        <!-- List View -->
        <section id="view-lista" class="view">
            <div class="view-header">
                <button class="back-btn" onclick="app.router.back()">Voltar</button>
                <h2 id="list-title">Locais</h2>
            </div>
            <div id="list-container" class="list-container">
                <!-- Items injected here -->
                <div class="loading">Carregando...</div>
            </div>
        </section>

        <!-- Detail View -->
        <section id="view-detalhe" class="view">
            <div class="view-header">
                <button class="back-btn" onclick="app.router.back()">Voltar</button>
                <h2>Detalhes</h2>
            </div>
            <div id="detail-container">
                <!-- Details injected here -->
            </div>
        </section>

        <!-- Emergency View -->
        <section id="view-emergencia" class="view">
            <div class="view-header">
                <button class="back-btn" onclick="app.router.back()">Voltar</button>
                <h2>Emergência</h2>
            </div>
            <div class="emergency-contacts" id="emergency-container">
                <!-- Contacts injected here -->
            </div>
        </section>

        <!-- Event Info View -->
        <section id="view-evento" class="view">
            <div class="view-header">
                <button class="back-btn" onclick="app.router.back()">Voltar</button>
                <h2>Sobre o Evento</h2>
            </div>
            <div id="event-container">
                <!-- Event info injected here -->
            </div>
        </section>

    </main>

    <!-- Bottom Nav (Optional, maybe just use home as hub) -->
    <!-- Keeping it simple: Home is Hub. -->

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="assets/js/api.js?v=3"></script>
    <script src="assets/js/map.js?v=3"></script>
    <script src="assets/js/app.js?v=3"></script>

    <script>
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('SW registred:', registration);
                    })
                    .catch(error => {
                        console.log('SW registration failed:', error);
                    });
            });
        }
    </script>
</body>

</html>
