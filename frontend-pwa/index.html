<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zelo - Assistente do Visitante</title>

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#137fec">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Zelo">

    <!-- CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="assets/css/style-v7-classic.css?v=7.1">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <!-- App Header -->
    <header class="app-header">
        <div class="header-left" onclick="app.router.navigate('home')">
            <img src="images/logo-zelo.png" alt="Zelo" class="header-logo">
            <span id="header-event-title" class="header-title">Zelo App</span>
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
            <div id="user-auth-indicator" onclick="app.auth.handleIconClick()" title="Acessar conta">
                <!-- Cleaner SVG Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
            <button id="install-btn" class="install-btn" style="display: none;">📲 Instalar</button>
            <div class="status-indicator" id="network-status">Online</div>
        </div>
    </header>

    <!-- Main Content -->
    <main id="app-content">

        <!-- Home View -->
        <section id="view-home" class="view active">
            <!-- Home Map Preview REMOVED for Rollback -->
            <div id="home-notice-container" style="display:none;"></div>
            <div id="home-map-card" style="display:none;"></div>

            <div class="quick-actions">
                <button class="action-card emergency" onclick="app.router.navigate('emergencia')">
                    <span class="icon">🚑</span>
                    <span>Emergência</span>
                </button>
                <button class="action-card pharmacy" onclick="app.router.navigate('lista', {category: 'farmacia'})">
                    <span class="icon">💊</span>
                    <span>Farmácias</span>
                </button>
                <button class="action-card hospital" onclick="app.router.navigate('lista', {category: 'hospital'})">
                    <span class="icon">🏥</span>
                    <span>Hospitais</span>
                </button>
            </div>

            <div style="text-align: center; font-size: 0.7rem; color: #999; margin-top: 2rem; padding-bottom: 6rem;">
                Versão: v7.1 (Classic Style Restored)
            </div>
        </section>

        <!-- Map View -->
        <section id="view-mapa" class="view">
            <div id="map-container"></div>
            <button class="back-fab" onclick="app.router.back()">⬅</button>
        </section>

        <!-- List View -->
        <section id="view-lista" class="view">
            <div class="view-header">
                <button class="back-btn" onclick="app.router.back()">Voltar</button>
                <h2 id="list-title">Locais</h2>
            </div>
            <div id="list-container" class="list-container">
                <!-- Items injected here -->
                <div class="loading">Carregando...</div>
            </div>
        </section>

        <!-- Detail View -->
        <section id="view-detalhe" class="view">
            <div class="view-header">
                <button class="back-btn" onclick="app.router.back()">Voltar</button>
                <h2>Detalhes</h2>
            </div>
            <div id="detail-container">
                <!-- Details injected here -->
            </div>
        </section>

        <!-- Emergency View -->
        <section id="view-emergencia" class="view">
            <div class="view-header">
                <button class="back-btn" onclick="app.router.back()">Voltar</button>
                <h2>Emergência</h2>
            </div>
            <div class="emergency-contacts" id="emergency-container">
                <!-- Contacts injected here -->
            </div>
        </section>

        <!-- Event Info View -->
        <section id="view-evento" class="view">
            <div class="view-header">
                <button class="back-btn" onclick="app.router.back()">Voltar</button>
                <h2>Sobre o Evento</h2>
            </div>
            <div id="event-container">
                <!-- Event info injected here -->
            </div>
        </section>

        <!-- Login View -->
        <section id="view-login" class="view">
            <div class="view-header">
                <button class="back-btn" onclick="app.router.back()">Voltar</button>
                <h2>Acesso Restrito</h2>
            </div>
            <div class="login-container">
                <div class="login-card">
                    <div style="text-align: center; margin-bottom: 2rem;">
                        <img src="images/logo-zelo.png" alt="Zelo" style="height: 60px;">
                        <p class="text-muted" style="margin-top: 1rem;">Entre com sua conta para acessar recursos
                            exclusivos.</p>
                    </div>

                    <form onsubmit="app.auth.login(event)">
                        <div class="form-group">
                            <label>Usuário ou Email</label>
                            <input type="text" id="login-username" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label>Senha</label>
                            <input type="password" id="login-password" class="form-input" required>
                        </div>

                        <div id="login-error" class="text-danger"
                            style="display:none; margin-bottom: 1rem; font-size: 0.9rem;"></div>

                        <button type="submit" class="btn-block" id="login-submit-btn">Entrar</button>
                    </form>

                    <div style="text-align: center; margin-top: 1.5rem;">
                        <a href="#" id="link-lost-password" target="_blank"
                            style="font-size: 0.9rem; color: var(--primary-color);">Esqueci minha senha</a>
                    </div>
                </div>
            </div>
        </section>

        <!-- Profile View (Simple for now) -->
        <section id="view-profile" class="view">
            <div class="view-header">
                <button class="back-btn" onclick="app.router.back()">Voltar</button>
                <h2>Meu Perfil</h2>
            </div>
            <div class="profile-card">
                <div class="profile-header">
                    <img id="profile-avatar" src="" alt="Avatar">
                    <h2 id="profile-name">Nome do Usuário</h2>
                    <p id="profile-email">email@exemplo.com</p>
                    <span id="profile-role" class="badge">Visitante</span>
                </div>

                <div class="profile-actions">
                    <a href="#" id="link-edit-profile" target="_blank" class="btn-block outline"
                        style="margin-bottom: 10px; text-decoration: none; display: block;">Alterar Avatar / Dados</a>
                    <button class="btn-block outline warning" onclick="app.auth.forceUpdate()"
                        style="margin-bottom: 10px; border-color: orange; color: orange;">↻ Atualizar App / Limpar
                        Cache</button>
                    <button class="btn-block outline" onclick="app.auth.logout()">Sair</button>
                </div>
            </div>
        </section>

    </main>

    <!-- Bottom Navigation -->
    <!-- Bottom Navigation Removed for Rollback -->

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="assets/js/api-v5.js?v=7.1"></script>
    <script src="assets/js/map-manager.js?v=7.1"></script>
    <script src="assets/js/app-v6.js?v=7.1"></script>

    <script>
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('SW registred:', registration);
                    })
                    .catch(error => {
                        console.log('SW registration failed:', error);
                    });
            });
        }
    </script>
</body>

</html>
